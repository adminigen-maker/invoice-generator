<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Invoice UAE</title>
    <style>
      html, body { height: 100%; margin: 0; }
      body {
        display: grid; place-items: center; text-align: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f8fafc; color: #0f172a; padding: 24px;
      }
      .card { max-width: 360px; }
      .badge { width: 64px; height: 64px; border-radius: 16px; background: #0f172a; margin: 0 auto 16px; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #475569; font-size: 14px; line-height: 1.5; margin: 0 0 20px; }
      button { background: #0f172a; color: #fff; border: 0; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge"></div>
      <h1>You're offline</h1>
      <p>Invoice UAE needs an internet connection to load your latest data. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
